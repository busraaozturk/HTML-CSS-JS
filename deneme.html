<div class="progress"></div>

<script>
    // İşlem başarılı olursa resolve, hata oluşursa reject kullanılır.
    new Promise ((resolve, reject) => {})

    function myFetch(url) {
        return new Promise((resolve,reject) => {
            // 2 saniye sonra cevaba dönmek için setTimeout kullanıyoruz.
            setTimeout(() => {
            const random = Math.random();
            if(random < 0.7) {
                // Başarılı sonuç
                resolve({data: `Veri başarıyla alındı! ${url}`});
            } else {
                // Hata durumu
                reject(new Error(`Veri alınırken hata oluştu! ${url}`));
                }
            }, 2000);
        });
    }

const url = '';
myFetch(url)
.then(response => {
    console.log(response.data);
}).catch(error => {
    console.error(error.message);
});



// Upoload Fonksiyonu
function upload(callback) {
    var current = 0;    // şu an kaçıncı adımda olduğumuzu tutar
    var total = 5;      // toplam kaç adım olduğunu tutar
    var interval = setInterval (() => {     // her 1 saniyede bir çalışacak fonksiyon
        current +=1;
        callback(current,total);
        if(current == total) {      // 5 adıma ulaşıldığında interval'ı durdurmak için clearInterval kullanılır.
            clearInterval(interval);
        }
    },1000);
}

const progress = document.querySelector('.progress');
upload((current,total) => {
    progress.innerHTML =current / total * 100 + '%' ;
    console.log(`Yükleniyor... ${current}/${total}`);
});
</script>
